[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spanoai"
version = "0.1.0"
description = "Python SDK for SpanoAI — shared working memory + a message bus for multi-agent AI systems"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "SpanoAI" }]
keywords = ["spanoai", "agents", "memory", "message-bus", "multi-agent", "llm"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.27",
  "websockets>=13",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23"]

[project.urls]
Homepage = "https://github.com/Sathwik-git/spanoai"
Repository = "https://github.com/Sathwik-git/spanoai"

[tool.hatch.build.targets.wheel]
packages = ["src/spanoai"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
