# docker-compose.yml — local dev infrastructure for the SpanoAI core engine.
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Reset:  docker compose down -v   (drops volumes — wipes all data)
#
# Schema is applied by the migration runner (`bun run db:migrate`), NOT by an
# initdb mount, so that the schema_migrations ledger stays authoritative.

services:
  redis:
    image: redis:7-alpine
    container_name: spanoai-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-spanoaidev}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-spanoaidev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: spanoai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: spanoai
      POSTGRES_USER: spanoai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spanoaidev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spanoai -d spanoai"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Object storage for artifacts (file bytes). S3-compatible.
  #   API:     http://localhost:9000
  #   Console: http://localhost:9001  (login: minioadmin / minioadmin)
  minio:
    image: minio/minio
    container_name: spanoai-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  # One-shot: wait for MinIO, then create the artifacts bucket (idempotent).
  minio-setup:
    image: minio/mc
    container_name: spanoai-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/${S3_BUCKET:-spanoai-artifacts};
      echo 'bucket ready'; exit 0;
      "

volumes:
  redis_data:
  pgdata:
  minio_data:
